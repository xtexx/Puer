#最大连锁挖掘方块数量 (默认: 64) / Maximum number of blocks to mine in a chain (default: 64)
# Default: 64
# Range: 1 ~ 16384
veinMinerMaxBlocks = 64
#最大连锁挖掘搜索半径 (默认: 32) / Maximum search radius for vein mining (default: 32)
# Default: 32
# Range: 1 ~ 64
veinMinerMaxDistance = 8
#是否启用连锁挖掘功能 (默认: true) / Whether vein mining is enabled (default: true)
veinMinerEnabled = true
#连锁挖掘时每个额外方块是否消耗额外耐久度 (默认: true) / Whether each extra block consumes additional durability (default: true)
veinMinerExtraDurability = false
#连锁挖掘模式: BLACKLIST(黑名单), WHITELIST(白名单), DISABLED(禁用) (默认: DISABLED) / Vein mining mode: BLACKLIST, WHITELIST, DISABLED (default: DISABLED)
veinMinerMode = "DISABLED"
#白名单方块列表，多个用逗号分隔 (例如: minecraft:stone,minecraft:iron_ore)，仅在模式为WHITELIST时生效 / Whitelist of blocks, comma-separated (e.g., minecraft:stone,minecraft:iron_ore). Only effective when mode is WHITELIST.
veinMinerWhitelist = ""
#黑名单方块列表，多个用逗号分隔 (例如: minecraft:bedrock,minecraft:obsidian)，仅在模式为BLACKLIST时生效 / Blacklist of blocks, comma-separated (e.g., minecraft:bedrock,minecraft:obsidian). Only effective when mode is BLACKLIST.
veinMinerBlacklist = ""
#连锁挖掘触发方式: KEYBIND(自定义键位,默认V键), SNEAK(潜行时触发), ALWAYS(直接触发) (默认: KEYBIND) / Vein mining trigger: KEYBIND(custom key,default V), SNEAK(hold shift), ALWAYS(always active) (default: KEYBIND)
veinMinerTriggerAction = "KEYBIND"
#范围白名单 (JSON格式)，定义立方体区域的两个对角坐标([x,y,z])，只有区域内的方块才会被连锁挖掘。多个区域用数组表示。一旦到达区域边界立刻停止此方向上的连锁。例如: [{"from":[100,50,100],"to":[200,80,200]},{"from":[300,60,300],"to":[400,90,400]}] / Range whitelist (JSON format). Define cuboid regions by two opposite corners. Only blocks within these regions will be vein mined. When empty, all positions are allowed (no range restriction). Multiple disjoint regions supported.
veinMinerRegions = "[{\"from\":[100,50,100],\"to\":[200,80,200]}]"