name: TeaCon 2026 Sync Pack-building Files

on:
  push:
    paths: [ "2026/**" ]
    branches: [ dev ]
    tags: [ '**' ]
  workflow_dispatch:

jobs:
  publish:
    # https://github.com/actions/runner-images/issues/10636
    # Aliyun CLI is removed from ubuntu-24.04 image among with a lot of several other CLI tools (Netlify, Vercel, etc)
    # Roll back to 22.04 for Jiachen. 
    # In the future, we need to make sure Aliyun CLI is installed before anything. 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Aliyun CLI & TeaCon CLI
        run: |
          curl https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o aliyun-cli-linux-latest.tgz
          tar xzvf aliyun-cli-linux-latest.tgz
          npm install -g https://archive.teacon.cn/cli/teaconmc-cli-latest.tgz
      - name: Setup profile
        env:
          REGION: ${{ secrets.REGION }}
          ACCESS_KEY: ${{ secrets.TEACON_ARCHIVE_ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.TEACON_ARCHIVE_SECRET_KEY }}
        run: ./aliyun configure set --profile main --region $REGION --mode AK --access-key-id $ACCESS_KEY --access-key-secret $SECRET_KEY
      - name: Generate Toad Artifacts For Test
        if: ${{ startsWith(github.ref, 'refs/heads') }}
        env:
          BUCKET: ${{ secrets.BUCKET }}
          REGION: ${{ secrets.REGION }}
          ACCESS_KEY: ${{ secrets.TEACON_ARCHIVE_ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.TEACON_ARCHIVE_SECRET_KEY }}
        run: |
          rm -rf toad
          mkdir -p toad

          teacon config set endpoints.archive-oss oss://$BUCKET/
          teacon config set endpoints.archive-http https://archive.teacon.cn/
          teacon config set secrets.oss-region $REGION
          teacon config set secrets.oss-access-key-id $ACCESS_KEY
          teacon config set secrets.oss-access-key-secret $SECRET_KEY

          teacon manifest generate test -f --no-pack-entries -M toad/teacon-manifest.test.toml
          teacon manifest assemble options test -f -M toad/teacon-manifest.test.toml -N toad/options.override.txt
          teacon manifest assemble resourcepack test -f -M toad/teacon-manifest.test.toml -Z toad/assets.override.zip
          teacon manifest assemble datapack test -f -M toad/teacon-manifest.test.toml -Z toad/data.override.zip

          python3 - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          root = Path("toad")
          files = {
              "options": "options.override.txt",
              "assets": "assets.override.zip",
              "data": "data.override.zip",
          }

          def digest(path: Path) -> str:
              return sha256(path.read_bytes()).hexdigest()

          lines = [
              "# Title",
              "[sync.title]",
              'hash = "1bb1032c369e5f1c982a203b5c8de7032027b12eace903cec5c99e0e36f95d42"',
              'file = "data:application/toml;base64,dGl0bGUgPSAiVGVhQ29uIDIwMjYgVGVzdCBDbGllbnQgLSBNaW5lY3JhZnQgMjYuMS4yIgoKW2xhbmcuZW5fdXNdCnRpdGxlID0gIlRlYUNvbiAyMDI2IFRlc3QgQ2xpZW50IC0gTWluZWNyYWZ0IDI2LjEuMiIKCltsYW5nLnpoX2NuXQp0aXRsZSA9ICJUZWFDb24gMjAyNiDmtYvor5XlrqLmiLfnq68gLSBNaW5lY3JhZnQgMjYuMS4yIgo="',
              "",
              "# Options",
              "[sync.options]",
              f'hash = "{digest(root / files["options"])}"',
              f'file = "{files["options"]}"',
              "",
              "# Resource pack",
              "[sync.assets]",
              f'hash = "{digest(root / files["assets"])}"',
              f'file = "{files["assets"]}"',
              "",
              "# Datapack",
              "[sync.data]",
              f'hash = "{digest(root / files["data"])}"',
              f'file = "{files["data"]}"',
              "",
              "",
          ]

          (root / "toad-sync-common.toml").write_text("\n".join(lines), encoding="utf-8")
          PY

          rm -f toad/teacon-manifest.test.toml
      - name: Sync For Test
        id: sync-test
        if: ${{ startsWith(github.ref, 'refs/heads') }}
        env:
          BUCKET: ${{ secrets.BUCKET }}
          ALIBABA_CLOUD_PROFILE: main
        run: |
          ./aliyun oss sync --delete --force --meta=Cache-Control:no-cache --backup-dir backup ./2026/ oss://$BUCKET/2026/puer/test/
          ./aliyun oss sync --delete --force --meta=Cache-Control:no-cache --backup-dir backup ./toad/ oss://$BUCKET/2026/toad/test/
      - name: Sync For Prod
        id: sync-prod
        if: ${{ startsWith(github.ref, 'refs/tags') }}
        env:
          BUCKET: ${{ secrets.BUCKET }}
          ALIBABA_CLOUD_PROFILE: main
        run: ./aliyun oss sync --delete --force --meta=Cache-Control:no-cache --backup-dir backup ./2026/ oss://$BUCKET/2026/puer/prod/
